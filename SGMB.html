<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0">
    <title>AR Whack-A-Box</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.3.0/dist/aframe-master.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: -apple-system, Arial, sans-serif; }

        /* HUD overlay */
        #hud {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            z-index: 999;
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            pointer-events: none;
        }
        .badge {
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 18px;
            font-weight: 700;
            backdrop-filter: blur(4px);
        }
        #score-badge { color: #4ade80; }
        #time-badge { color: #fbbf24; }

        /* Center message / start & game-over screens */
        #overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: rgba(15, 23, 42, 0.92);
            color: #fff;
            padding: 24px;
        }
        #overlay h1 {
            font-size: 28px;
            margin-bottom: 12px;
            background: linear-gradient(90deg,#4ade80,#22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #overlay p {
            font-size: 15px;
            line-height: 1.6;
            max-width: 340px;
            margin-bottom: 10px;
            color: #cbd5e1;
        }
        #overlay .big-score {
            font-size: 48px;
            font-weight: 800;
            color: #4ade80;
            margin: 8px 0;
        }
        #start-btn {
            margin-top: 18px;
            padding: 14px 36px;
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            background: linear-gradient(90deg,#4ade80,#22d3ee);
            border: none;
            border-radius: 999px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(34,211,238,0.4);
        }
        #start-btn:active { transform: scale(0.96); }
        .hidden { display: none !important; }

        /* hit feedback flash */
        #flash {
            position: fixed;
            inset: 0;
            background: #4ade80;
            opacity: 0;
            pointer-events: none;
            z-index: 998;
            transition: opacity 0.15s;
        }
    </style>
</head>
<body>
    <!-- HUD -->
    <div id="hud" class="hidden">
        <div class="badge" id="score-badge">⭐ 0</div>
        <div class="badge" id="time-badge">⏱ 30</div>
    </div>

    <div id="flash"></div>

    <!-- Start / Game Over overlay -->
    <div id="overlay">
        <h1>AR Whack-A-Box</h1>
        <p>Point your camera at the <b>Hiro marker</b> and tap the glowing boxes before they vanish!</p>
        <p style="font-size:13px;color:#64748b;">Print the marker:<br>ar-js-org.github.io/AR.js/data/images/hiro.png</p>
        <div class="big-score hidden" id="final-score">0</div>
        <button id="start-btn">▶ Start Game</button>
    </div>

    <!-- AR Scene -->
    <a-scene
        embedded
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;"
        renderer="logarithmicDepthBuffer: true;"
        gesture-detector>

        <a-assets></a-assets>

        <!-- Hiro marker -->
        <a-marker preset="hiro" id="marker">
            <!-- Targets get spawned here as children -->
            <a-entity id="spawn-root"></a-entity>

            <!-- A little base platform -->
            <a-box position="0 0 0" rotation="-90 0 0"
                   width="1.6" height="1.6" depth="0.05"
                   color="#1e293b" opacity="0.4"></a-box>
        </a-marker>

        <a-entity camera></a-entity>

        <!-- Raycaster from screen taps -->
        <a-entity id="cursor-rig"
            cursor="rayOrigin: mouse; fuse: false;"
            raycaster="objects: .target; far: 100;">
        </a-entity>
    </a-scene>

    <script>
        const GAME_TIME = 30;       // seconds
        const MAX_TARGETS = 4;      // max simultaneous targets
        const LIFETIME = 1500;      // ms a target stays before vanishing

        let score = 0;
        let timeLeft = GAME_TIME;
        let playing = false;
        let spawnTimer = null;
        let countdownTimer = null;

        const spawnRoot = document.getElementById('spawn-root');
        const scoreBadge = document.getElementById('score-badge');
        const timeBadge = document.getElementById('time-badge');
        const hud = document.getElementById('hud');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const finalScore = document.getElementById('final-score');
        const flash = document.getElementById('flash');

        const COLORS = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#06b6d4', '#a855f7'];

        function randRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        function spawnTarget() {
            if (!playing) return;
            if (spawnRoot.children.length >= MAX_TARGETS) return;

            const box = document.createElement('a-box');
            const x = randRange(-0.55, 0.55);
            const z = randRange(-0.55, 0.55);
            const color = COLORS[Math.floor(Math.random() * COLORS.length)];

            box.classList.add('target');
            box.setAttribute('position', `${x} 0.05 ${z}`);
            box.setAttribute('scale', '0.001 0.001 0.001');
            box.setAttribute('width', '0.28');
            box.setAttribute('height', '0.28');
            box.setAttribute('depth', '0.28');
            box.setAttribute('color', color);
            box.setAttribute('material', 'emissive: ' + color + '; emissiveIntensity: 0.35; metalness: 0.3; roughness: 0.4;');

            // pop-in animation
            box.setAttribute('animation__pop', {
                property: 'scale',
                to: '1 1 1',
                dur: 200,
                easing: 'easeOutBack'
            });
            // gentle spin
            box.setAttribute('animation__spin', {
                property: 'rotation',
                to: '0 360 0',
                loop: true,
                dur: 3000,
                easing: 'linear'
            });
            // bobbing
            box.setAttribute('animation__bob', {
                property: 'position',
                to: `${x} 0.18 ${z}`,
                dir: 'alternate',
                loop: true,
                dur: 700,
                easing: 'easeInOutSine'
            });

            let hit = false;

            // click / tap to score
            box.addEventListener('click', function () {
                if (hit || !playing) return;
                hit = true;
                score++;
                scoreBadge.textContent = '⭐ ' + score;
                doFlash();
                // shrink & remove
                box.removeAttribute('animation__bob');
                box.setAttribute('animation__hit', {
                    property: 'scale',
                    to: '0.001 0.001 0.001',
                    dur: 150,
                    easing: 'easeInBack'
                });
                setTimeout(() => box.parentNode && box.remove(), 160);
            });

            spawnRoot.appendChild(box);

            // auto-remove after lifetime if not hit
            setTimeout(() => {
                if (!hit && box.parentNode) {
                    box.setAttribute('animation__gone', {
                        property: 'scale',
                        to: '0.001 0.001 0.001',
                        dur: 200
                    });
                    setTimeout(() => box.parentNode && box.remove(), 210);
                }
            }, LIFETIME);
        }

        function doFlash() {
            flash.style.opacity = '0.35';
            setTimeout(() => flash.style.opacity = '0', 120);
        }

        function loopSpawn() {
            spawnTarget();
            const next = randRange(400, 900);
            spawnTimer = setTimeout(loopSpawn, next);
        }

        function startGame() {
            score = 0;
            timeLeft = GAME_TIME;
            playing = true;
            scoreBadge.textContent = '⭐ 0';
            timeBadge.textContent = '⏱ ' + timeLeft;

            overlay.classList.add('hidden');
            hud.classList.remove('hidden');

            // clear leftover targets
            while (spawnRoot.firstChild) spawnRoot.removeChild(spawnRoot.firstChild);

            loopSpawn();

            countdownTimer = setInterval(() => {
                timeLeft--;
                timeBadge.textContent = '⏱ ' + timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame() {
            playing = false;
            clearTimeout(spawnTimer);
            clearInterval(countdownTimer);

            // remove remaining targets
            while (spawnRoot.firstChild) spawnRoot.removeChild(spawnRoot.firstChild);

            hud.classList.add('hidden');
            overlay.classList.remove('hidden');
            overlay.querySelector('h1').textContent = '⏰ Time\'s Up!';
            overlay.querySelectorAll('p').forEach(p => p.classList.add('hidden'));
            finalScore.textContent = score;
            finalScore.classList.remove('hidden');
            startBtn.textContent = '↻ Play Again';
        }

        startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
